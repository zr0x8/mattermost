name: build-and-release-from-fork

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'webapp/**'

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    env:
      MM_PACKAGE: mattermost-${{ github.ref_name }}-linux-amd64.tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Build webapp
        run: |
          cd webapp
          npm ci
          npm run build

      - name: Build server
        run: make build-linux

      - name: Download previous release as base
        run: |
          gh release download --pattern "*.tar.gz" --dir base-release \
            $(gh release list --limit 1 --json tagName -q '.[0].tagName')
          tar -xzf base-release/*.tar.gz -C base-release/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Merge changes into package
        run: |
          mkdir -p dist/mattermost

          if [ -d base-release/mattermost ]; then
            cp -r base-release/mattermost/. dist/mattermost/
          fi

          [ -f bin/mattermost ] && cp bin/mattermost dist/mattermost/bin/
          [ -d webapp/dist ]    && cp -r webapp/dist/. dist/mattermost/client/

          cp -r config    dist/mattermost/
          cp -r i18n      dist/mattermost/
          cp -r templates dist/mattermost/

          tar -czf "${MM_PACKAGE}" -C dist mattermost

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MM_PACKAGE }}

name: build-and-release-from-fork

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - '**/*.go'
              - 'server/go.mod'
              - 'server/go.sum'
            frontend:
              - 'webapp/**'

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    env:
      MM_PACKAGE: mattermost-${{ github.ref_name }}-linux-amd64.tar.gz
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Build webapp
        run: |
          cd webapp
          npm ci
          npm run build

      - name: Build server
        run: cd server && make build-linux

      - name: Download previous release as base
        run: |
          set +e
          PREV_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          if [ -n "$PREV_TAG" ]; then
            gh release download --pattern "*.tar.gz" --dir base-release "$PREV_TAG"
            if ls base-release/*.tar.gz >/dev/null 2>&1; then
              tar -xzf base-release/*.tar.gz -C base-release/
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Merge changes into package
        run: |
          mkdir -p dist/mattermost dist/mattermost/bin dist/mattermost/client

          if [ -d base-release/mattermost ]; then
            cp -r base-release/mattermost/. dist/mattermost/
          fi

          [ -f server/bin/mattermost ] && cp server/bin/mattermost dist/mattermost/bin/
          [ -f bin/mattermost ] && cp bin/mattermost dist/mattermost/bin/
          [ -d webapp/dist ]    && cp -r webapp/dist/. dist/mattermost/client/

          [ -d server/config ]    && cp -r server/config dist/mattermost/
          [ -d server/i18n ]      && cp -r server/i18n dist/mattermost/
          [ -d server/templates ] && cp -r server/templates dist/mattermost/
          [ -d config ]           && cp -r config dist/mattermost/
          [ -d i18n ]             && cp -r i18n dist/mattermost/
          [ -d templates ]        && cp -r templates dist/mattermost/

          tar -czf "${MM_PACKAGE}" -C dist mattermost

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MM_PACKAGE }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Triggering Jenkins
        if: ${{ success() && secrets.DOCKER_BUILD_WEBHOOK_URL != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.DOCKER_BUILD_WEBHOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST "$WEBHOOK_URL"
